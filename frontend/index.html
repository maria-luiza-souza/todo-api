<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TaskFlow">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="TaskFlow">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>TaskFlow</title>
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5a6fd6;
            --danger: #ff4757;
            --success: #2ed573;
            --warning: #ffa502;
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #333333;
            --text-light: #666666;
            --border: #e0e0e0;
            --shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg: #1a1a2e;
            --card: #16213e;
            --text: #e0e0e0;
            --text-light: #a0a0a0;
            --border: #2a2a4a;
            --shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        .container { max-width: 800px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary);
            font-size: 2rem;
        }

        .header-actions { display: flex; gap: 10px; align-items: center; }

        .theme-toggle {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 25px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            transition: background 0.3s;
        }

        h2 { color: var(--text); margin-bottom: 20px; font-size: 1.4rem; }

        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-light);
            font-weight: 500;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            background: var(--card);
            color: var(--text);
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        textarea { resize: vertical; min-height: 80px; }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.15); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-sm { padding: 8px 14px; font-size: 13px; }
        .btn-full { width: 100%; }
        .btn-ghost { background: transparent; color: var(--text-light); border: 2px solid var(--border); }

        .hidden { display: none !important; }

        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        .tab {
            padding: 12px 24px;
            cursor: pointer;
            color: var(--text-light);
            font-weight: 500;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
        .tab:hover { color: var(--primary); }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 500;
        }

        .message-error { background: #ffe0e0; color: var(--danger); }
        .message-success { background: #e0ffe0; color: var(--success); }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .user-info { color: var(--text-light); font-size: 14px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--primary) 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-card.success { background: linear-gradient(135deg, #2ed573 0%, #1abc9c 100%); }
        .stat-card.warning { background: linear-gradient(135deg, #ffa502 0%, #ff6348 100%); }
        .stat-card.danger { background: linear-gradient(135deg, #ff4757 0%, #c0392b 100%); }

        .stat-number { font-size: 2rem; font-weight: 700; }
        .stat-label { font-size: 13px; opacity: 0.9; margin-top: 5px; }

        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filters select, .filters input {
            flex: 1;
            min-width: 150px;
        }

        .task-list { list-style: none; }

        .task-item {
            display: flex;
            align-items: flex-start;
            padding: 18px;
            border-bottom: 1px solid var(--border);
            gap: 14px;
            transition: background 0.2s;
        }

        .task-item:hover { background: var(--bg); }
        .task-item:last-child { border-bottom: none; }

        .task-checkbox {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: var(--primary);
            margin-top: 3px;
        }

        .task-content { flex: 1; min-width: 0; }

        .task-title {
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
            word-break: break-word;
        }

        .task-title.completed { text-decoration: line-through; color: var(--text-light); }

        .task-description {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .task-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-alta { background: #ffe0e0; color: var(--danger); }
        .badge-média { background: #fff3e0; color: var(--warning); }
        .badge-baixa { background: #e0ffe0; color: var(--success); }
        .badge-trabalho { background: #e0e0ff; color: #5555cc; }
        .badge-estudos { background: #ffe0ff; color: #cc55cc; }
        .badge-pessoal { background: #e0ffff; color: #55cccc; }
        .badge-outros { background: #f0f0f0; color: #888; }

        .task-due {
            font-size: 12px;
            color: var(--text-light);
        }

        .task-due.overdue { color: var(--danger); font-weight: 600; }

        .task-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-light);
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
            opacity: 0.4;
        }

        .edit-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .edit-form input, .edit-form select { font-size: 14px; padding: 10px; }
        .edit-actions { display: flex; gap: 8px; }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s;
        }

        .toast-success { background: var(--success); }
        .toast-error { background: var(--danger); }

        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }

        .btn-new-task {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-new-task:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .btn-new-task:active {
            transform: translateY(0);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--card);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transform: translateY(30px) scale(0.95);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0) scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h2 {
            margin-bottom: 0;
        }

        .modal-close {
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }

        @media (max-width: 600px) {
            .form-row { flex-direction: column; }
            .filters { flex-direction: column; }
            .task-actions { flex-direction: column; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .modal-content { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>TaskFlow</h1>
            <div class="header-actions">
                <button class="theme-toggle" onclick="toggleTheme()" title="Alternar tema">🌙</button>
            </div>
        </header>

        <!-- Auth Section -->
        <div id="auth-section">
            <div class="card">
                <div class="tabs">
                    <div class="tab active" onclick="showLogin()">Login</div>
                    <div class="tab" onclick="showRegister()">Registrar</div>
                </div>
                <div id="message" class="message hidden"></div>
                <div id="login-form">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Senha</label>
                        <input type="password" id="login-password" placeholder="Sua senha">
                    </div>
                    <button class="btn btn-primary btn-full" onclick="login()">Entrar</button>
                </div>
                <div id="register-form" class="hidden">
                    <div class="form-group">
                        <label for="register-name">Nome</label>
                        <input type="text" id="register-name" placeholder="Seu nome">
                    </div>
                    <div class="form-group">
                        <label for="register-email">Email</label>
                        <input type="email" id="register-email" placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label for="register-password">Senha</label>
                        <input type="password" id="register-password" placeholder="Mínimo 6 caracteres">
                    </div>
                    <button class="btn btn-primary btn-full" onclick="register()">Criar conta</button>
                </div>
            </div>
        </div>

        <!-- Tasks Section -->
        <div id="tasks-section" class="hidden">
            <div class="header-bar">
                <div>
                    <h2>Minhas Tarefas</h2>
                    <div class="user-info" id="user-info"></div>
                </div>
                <div class="header-actions">
                    <button class="btn btn-ghost btn-sm" onclick="exportTasks()">📥 Exportar</button>
                    <button class="btn btn-ghost btn-sm" onclick="logout()">Sair</button>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-grid" id="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="stat-total">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-card success">
                    <div class="stat-number" id="stat-completed">0</div>
                    <div class="stat-label">Concluídas</div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-number" id="stat-pending">0</div>
                    <div class="stat-label">Pendentes</div>
                </div>
                <div class="stat-card danger">
                    <div class="stat-number" id="stat-overdue">0</div>
                    <div class="stat-label">Atrasadas</div>
                </div>
            </div>

            <!-- Create Task Button -->
            <button class="btn-new-task" onclick="toggleCreateModal(true)">
                <span style="font-size: 22px;">+</span> Nova Tarefa
            </button>

            <!-- Create Task Modal -->
            <div class="modal-overlay" id="create-modal" onclick="closeModalOverlay(event)">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>Nova Tarefa</h2>
                        <button class="modal-close" onclick="toggleCreateModal(false)">&#10005;</button>
                    </div>
                    <div id="tasks-message" class="message hidden"></div>
                    <div class="form-group">
                        <label for="task-title">Título</label>
                        <input type="text" id="task-title" placeholder="O que precisa fazer?">
                    </div>
                    <div class="form-group">
                        <label for="task-description">Descrição (opcional)</label>
                        <textarea id="task-description" placeholder="Detalhes da tarefa..."></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="task-priority">Prioridade</label>
                            <select id="task-priority">
                                <option value="baixa">Baixa</option>
                                <option value="média" selected>Média</option>
                                <option value="alta">Alta</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="task-category">Categoria</label>
                            <select id="task-category">
                                <option value="outros">Outros</option>
                                <option value="trabalho">Trabalho</option>
                                <option value="estudos">Estudos</option>
                                <option value="pessoal">Pessoal</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="task-dueDate">Data de vencimento</label>
                        <input type="date" id="task-dueDate">
                    </div>
                    <button class="btn btn-primary btn-full" onclick="createTask()">Adicionar Tarefa</button>
                </div>
            </div>

            <!-- Filters -->
            <div class="card">
                <h2>Filtros</h2>
                <div class="filters">
                    <input type="text" id="filter-search" placeholder="🔍 Buscar tarefa..." oninput="loadTasks()">
                    <select id="filter-priority" onchange="loadTasks()">
                        <option value="">Todas prioridades</option>
                        <option value="baixa">Baixa</option>
                        <option value="média">Média</option>
                        <option value="alta">Alta</option>
                    </select>
                    <select id="filter-category" onchange="loadTasks()">
                        <option value="">Todas categorias</option>
                        <option value="trabalho">Trabalho</option>
                        <option value="estudos">Estudos</option>
                        <option value="pessoal">Pessoal</option>
                        <option value="outros">Outros</option>
                    </select>
                    <select id="filter-status" onchange="loadTasks()">
                        <option value="">Todos status</option>
                        <option value="false">Pendentes</option>
                        <option value="true">Concluídas</option>
                    </select>
                    <select id="filter-sort" onchange="loadTasks()">
                        <option value="">Mais recentes</option>
                        <option value="priority">Prioridade</option>
                        <option value="dueDate">Data vencimento</option>
                        <option value="title">Título A-Z</option>
                    </select>
                </div>
            </div>

            <!-- Task List -->
            <div class="card">
                <ul id="task-list" class="task-list"></ul>
                <div id="empty-state" class="empty-state hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                    <p>Nenhuma tarefa encontrada</p>
                    <p>Adicione uma tarefa ou ajuste os filtros!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://todo-api-weld-psi.vercel.app';
        let token = localStorage.getItem('token');
        let user = JSON.parse(localStorage.getItem('user') || 'null');

        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.querySelector('.theme-toggle').textContent = '☀️';
        }

        if (token && user) {
            showTasksSection();
            loadTasks();
            loadStats();
        }

        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
            document.querySelector('.theme-toggle').textContent = isDark ? '🌙' : '☀️';
        }

        function showLogin() {
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('register-form').classList.add('hidden');
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.querySelectorAll('.tab')[1].classList.remove('active');
            hideMessage();
        }

        function showRegister() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
            document.querySelectorAll('.tab')[0].classList.remove('active');
            document.querySelectorAll('.tab')[1].classList.add('active');
            hideMessage();
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message message-${type}`;
            msg.classList.remove('hidden');
        }

        function hideMessage() {
            document.getElementById('message').classList.add('hidden');
        }

        function showToast(text, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = text;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            if (!email || !password) { showMessage('Preencha todos os campos', 'error'); return; }

            try {
                const res = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.success) {
                    token = data.token;
                    user = data.user;
                    localStorage.setItem('token', token);
                    localStorage.setItem('user', JSON.stringify(user));
                    showTasksSection();
                    loadTasks();
                    loadStats();
                } else {
                    showMessage(data.error || 'Erro ao fazer login', 'error');
                }
            } catch (err) { showMessage('Erro de conexão', 'error'); }
        }

        async function register() {
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;

            if (!name || !email || !password) { showMessage('Preencha todos os campos', 'error'); return; }
            if (password.length < 6) { showMessage('Senha deve ter no mínimo 6 caracteres', 'error'); return; }

            try {
                const res = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                if (data.success) {
                    token = data.token;
                    user = data.user;
                    localStorage.setItem('token', token);
                    localStorage.setItem('user', JSON.stringify(user));
                    showTasksSection();
                    loadTasks();
                    loadStats();
                } else {
                    showMessage(data.error || 'Erro ao registrar', 'error');
                }
            } catch (err) { showMessage('Erro de conexão', 'error'); }
        }

        function logout() {
            token = null;
            user = null;
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('tasks-section').classList.add('hidden');
        }

        function showTasksSection() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('tasks-section').classList.remove('hidden');
            document.getElementById('user-info').textContent = `Olá, ${user.name}!`;
        }

        async function loadStats() {
            try {
                const res = await fetch(`${API_URL}/api/tasks/stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('stat-total').textContent = data.data.total;
                    document.getElementById('stat-completed').textContent = data.data.completed;
                    document.getElementById('stat-pending').textContent = data.data.pending;
                    document.getElementById('stat-overdue').textContent = data.data.overdue;
                }
            } catch (err) { console.error('Erro ao carregar estatísticas'); }
        }

        async function loadTasks() {
            const search = document.getElementById('filter-search').value;
            const priority = document.getElementById('filter-priority').value;
            const category = document.getElementById('filter-category').value;
            const status = document.getElementById('filter-status').value;
            const sort = document.getElementById('filter-sort').value;

            let url = `${API_URL}/api/tasks?`;
            if (search) url += `search=${search}&`;
            if (priority) url += `priority=${priority}&`;
            if (category) url += `category=${category}&`;
            if (status !== '') url += `completed=${status}&`;
            if (sort) url += `sort=${sort}&`;

            try {
                const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                if (data.success) renderTasks(data.data);
            } catch (err) { showToast('Erro ao carregar tarefas', 'error'); }
        }

        function renderTasks(tasks) {
            const list = document.getElementById('task-list');
            const empty = document.getElementById('empty-state');

            if (tasks.length === 0) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            list.innerHTML = tasks.map(task => {
                const dueDate = task.dueDate ? new Date(task.dueDate).toLocaleDateString('pt-BR') : '';
                const isOverdue = task.dueDate && !task.completed && new Date(task.dueDate) < new Date();

                return `
                <li class="task-item" id="task-${task._id}">
                    <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} 
                        onchange="toggleTask('${task._id}', this.checked)">
                    <div class="task-content">
                        <div class="task-title ${task.completed ? 'completed' : ''}">${task.title}</div>
                        ${task.description ? `<div class="task-description">${task.description}</div>` : ''}
                        <div class="task-meta">
                            <span class="badge badge-${task.priority}">${task.priority}</span>
                            <span class="badge badge-${task.category}">${task.category}</span>
                            ${dueDate ? `<span class="task-due ${isOverdue ? 'overdue' : ''}">📅 ${dueDate}${isOverdue ? ' (atrasada)' : ''}</span>` : ''}
                        </div>
                    </div>
                    <div class="task-actions">
                        <button class="btn btn-primary btn-sm" onclick="editTask('${task._id}')">✏️</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteTask('${task._id}')">🗑️</button>
                    </div>
                </li>`;
            }).join('');
        }

        function toggleCreateModal(show) {
            const modal = document.getElementById('create-modal');
            if (show) {
                modal.classList.add('active');
                setTimeout(() => document.getElementById('task-title').focus(), 300);
            } else {
                modal.classList.remove('active');
                document.getElementById('task-title').value = '';
                document.getElementById('task-description').value = '';
                document.getElementById('task-dueDate').value = '';
            }
        }

        function closeModalOverlay(event) {
            if (event.target === event.currentTarget) {
                toggleCreateModal(false);
            }
        }

        async function createTask() {
            const title = document.getElementById('task-title').value;
            const description = document.getElementById('task-description').value;
            const priority = document.getElementById('task-priority').value;
            const category = document.getElementById('task-category').value;
            const dueDate = document.getElementById('task-dueDate').value;

            if (!title) { showToast('Digite um título', 'error'); return; }

            try {
                const res = await fetch(`${API_URL}/api/tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ title, description, priority, category, dueDate: dueDate || null })
                });
                const data = await res.json();
                if (data.success) {
                    toggleCreateModal(false);
                    loadTasks();
                    loadStats();
                    showToast('Tarefa criada!');
                } else {
                    showToast(data.error || 'Erro ao criar tarefa', 'error');
                }
            } catch (err) { showToast('Erro de conexão', 'error'); }
        }

        async function toggleTask(id, completed) {
            try {
                await fetch(`${API_URL}/api/tasks/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ completed })
                });
                loadStats();
            } catch (err) { showToast('Erro ao atualizar', 'error'); }
        }

        async function deleteTask(id) {
            if (!confirm('Excluir esta tarefa?')) return;
            try {
                const res = await fetch(`${API_URL}/api/tasks/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    loadTasks();
                    loadStats();
                    showToast('Tarefa excluída!');
                }
            } catch (err) { showToast('Erro ao excluir', 'error'); }
        }

        async function editTask(id) {
            const taskEl = document.getElementById(`task-${id}`);
            const titleEl = taskEl.querySelector('.task-title');
            const currentTitle = titleEl.textContent;

            taskEl.querySelector('.task-content').innerHTML = `
                <div class="edit-form">
                    <input type="text" id="edit-title-${id}" value="${currentTitle}">
                    <div class="form-row">
                        <select id="edit-priority-${id}">
                            <option value="baixa">Baixa</option>
                            <option value="média">Média</option>
                            <option value="alta">Alta</option>
                        </select>
                        <select id="edit-category-${id}">
                            <option value="outros">Outros</option>
                            <option value="trabalho">Trabalho</option>
                            <option value="estudos">Estudos</option>
                            <option value="pessoal">Pessoal</option>
                        </select>
                    </div>
                    <div class="edit-actions">
                        <button class="btn btn-success btn-sm" onclick="saveEdit('${id}')">Salvar</button>
                        <button class="btn btn-ghost btn-sm" onclick="loadTasks()">Cancelar</button>
                    </div>
                </div>`;
        }

        async function saveEdit(id) {
            const title = document.getElementById(`edit-title-${id}`).value;
            const priority = document.getElementById(`edit-priority-${id}`).value;
            const category = document.getElementById(`edit-category-${id}`).value;

            try {
                const res = await fetch(`${API_URL}/api/tasks/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ title, priority, category })
                });
                const data = await res.json();
                if (data.success) {
                    loadTasks();
                    showToast('Tarefa atualizada!');
                }
            } catch (err) { showToast('Erro ao atualizar', 'error'); }
        }

        async function exportTasks() {
            try {
                const res = await fetch(`${API_URL}/api/tasks`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    const blob = new Blob([JSON.stringify(data.data, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'tarefas.json';
                    a.click();
                    URL.revokeObjectURL(url);
                    showToast('Tarefas exportadas!');
                }
            } catch (err) { showToast('Erro ao exportar', 'error'); }
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (!document.getElementById('auth-section').classList.contains('hidden')) {
                    if (!document.getElementById('login-form').classList.contains('hidden')) login();
                    else register();
                }
            }
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registrado:', reg.scope))
                    .catch(err => console.log('Erro ao registrar Service Worker:', err));
            });
        }
    </script>
</body>
</html>
